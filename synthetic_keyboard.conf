# Device name
# Token 1: setting name (`dev_id`)
# Token 2: device filename from `/dev/input/by-id/` to open and grab
dev_id   usb-SteelSeries_SteelSeries_Apex_3-event-kbd

# Motion tuning variables
# Token 1: variable name
# Token 2: numeric value
# `acceleration`: how quickly pointer speed ramps up while held
# `max_speed`: normal maximum pointer speed
# `mouse_break_factor`: max pointer speed multiplier while `mouse_break` is held
# `scroll_break_factor`: scroll speed multiplier while `mouse_break` is held
# `wheel`: wheel delta emitted for each scroll step
acceleration        0.3
max_speed           16
mouse_break_factor  0.35
scroll_break_factor 0.2
wheel               40

# Bindings
# Binding format:
# Token 1: synthetic action name (`up`, `left_click`, `scroll_down`, ...)
# Token 2: source evdev input name from libevdev (`KEY_*`, `BTN_*`, `ABS_*`, ...)
# Optional token: range written as `release..press` for analog inputs / axes
# Optional prefix: put `!` before token 2 to also pass the matched source event through
# Example: `mouse_break ! KEY_LEFTSHIFT`
# Meaning: pressing `KEY_LEFTSHIFT` triggers `mouse_break`, and the original key event is still forwarded
up            KEY_KP8
down          KEY_KP5
left          KEY_KP4
right         KEY_KP6
right_click   KEY_KPPLUS
left_click    KEY_KP0
scroll_down   KEY_KP3
scroll_up     KEY_KP1
scroll_click  KEY_KP2
backward      KEY_KP7
forward       KEY_KP9
mouse_break   ! KEY_LEFTMETA
toggle_disable KEY_INSERT
